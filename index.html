<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CONTEC 건강 챌린지</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1B4F8E" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="건강챌린지" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue: #1B4F8E; --blue-dark: #143d6e; --blue-light: #B5D4F4; --blue-pale: #E6F1FB;
      --gold: #FAC775; --silver: #D3D1C7; --bronze: #F5C4B3;
      --text: #1a1a1a; --text-sub: #666; --text-hint: #999;
      --border: rgba(0,0,0,0.08); --bg: #f4f6fb; --card: #fff; --danger: #e24b4a;
      --c-steps: #1B4F8E; --c-exercise: #1D9E75; --c-sleep: #7B5EA7; --c-water: #2196F3;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
    .screen { display: none; min-height: 100vh; }
    .screen.active { display: flex; flex-direction: column; }

    /* LOGIN */
    #screen-login { align-items: center; justify-content: center; padding: 2rem 1.25rem; background: linear-gradient(160deg, #eef2fb 0%, #e4ecf7 100%); }
    .login-card { width: 100%; max-width: 380px; background: var(--card); border-radius: 24px; padding: 2.5rem 2rem; box-shadow: 0 8px 32px rgba(27,79,142,0.12); }
    .login-logo { text-align: center; margin-bottom: 2rem; }
    .login-logo img { width: 150px; height: auto; display: block; margin: 0 auto 12px; }
    .login-logo .app-name { font-size: 17px; font-weight: 700; color: var(--blue); }
    .login-logo .app-sub { font-size: 12px; color: var(--text-sub); margin-top: 3px; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 12px; font-weight: 500; color: var(--text-sub); margin-bottom: 6px; }
    .field input { width: 100%; padding: 11px 14px; font-size: 15px; font-family: inherit; border: 1.5px solid var(--border); border-radius: 10px; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
    .field input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(27,79,142,0.12); background: #fff; }
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 56px; }
    .pw-eye { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); font-size: 12px; color: var(--text-hint); background: none; border: none; cursor: pointer; padding: 4px; }
    .error-msg { font-size: 12px; color: var(--danger); margin-top: 6px; display: none; }
    .btn-login { width: 100%; padding: 13px; margin-top: 8px; background: var(--blue); color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; }
    .btn-login:hover { background: var(--blue-dark); }
    .login-hint { text-align: center; font-size: 12px; color: var(--text-hint); margin-top: 14px; }

    /* TOPBAR */
    .topbar { background: var(--card); border-bottom: 1px solid var(--border); padding: 0 1.25rem; height: 52px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .topbar img { height: 22px; width: auto; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .topbar-name { font-size: 13px; color: var(--text-sub); }
    .topbar-name strong { color: var(--text); font-weight: 700; }
    .btn-logout { font-size: 12px; color: var(--text-hint); background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 5px 10px; cursor: pointer; font-family: inherit; }

    .main-content { flex: 1; overflow-y: auto; padding: 1.25rem; padding-bottom: 5rem; }

    /* TODAY HEADER */
    .today-header { background: var(--blue); border-radius: 16px; padding: 1.25rem; margin-bottom: 1rem; color: white; display: flex; align-items: center; justify-content: space-between; }
    .today-date { font-size: 12px; opacity: 0.8; margin-bottom: 2px; }
    .today-title { font-size: 17px; font-weight: 700; }
    .today-badge { background: rgba(255,255,255,0.2); border-radius: 20px; padding: 6px 14px; font-size: 12px; font-weight: 500; }

    .section-title { font-size: 12px; font-weight: 700; color: var(--text-sub); margin-bottom: 10px; letter-spacing: 0.3px; }

    /* INPUT CARDS */
    .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
    .input-card { background: var(--card); border-radius: 16px; border: 1.5px solid var(--border); padding: 1rem; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; position: relative; overflow: hidden; }
    .input-card:active { transform: scale(0.97); }
    .ic-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 16px 16px 0 0; opacity: 0; transition: opacity 0.2s; }
    .input-card.done .ic-bar { opacity: 1; }
    .ic-icon { font-size: 22px; margin-bottom: 6px; }
    .ic-label { font-size: 11px; color: var(--text-sub); font-weight: 500; margin-bottom: 4px; }
    .ic-value { font-size: 22px; font-weight: 700; color: var(--text); line-height: 1; }
    .ic-unit { font-size: 11px; color: var(--text-hint); margin-top: 2px; }
    .ic-edit { font-size: 11px; font-weight: 500; margin-top: 6px; }

    /* SAVE BUTTON */
    .btn-save { width: 100%; padding: 14px; background: var(--blue); color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; margin-bottom: 1.5rem; }
    .btn-save:disabled { background: var(--text-hint); cursor: not-allowed; }

    /* TABS */
    .tabs { display: flex; background: var(--card); border-radius: 12px; padding: 4px; margin-bottom: 1rem; border: 1px solid var(--border); gap: 3px; }
    .tab { flex: 1; padding: 7px 4px; font-size: 12px; font-weight: 500; border: none; border-radius: 8px; cursor: pointer; background: none; color: var(--text-sub); font-family: inherit; }
    .tab.active { background: var(--blue); color: white; }

    /* RANKING */
    .rank-list { background: var(--card); border-radius: 14px; border: 1px solid var(--border); overflow: hidden; }
    .rank-row { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-bottom: 1px solid var(--border); }
    .rank-row:last-child { border-bottom: none; }
    .rank-row.is-me { background: var(--blue-pale); }
    .rank-num { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; background: var(--bg); color: var(--text-sub); }
    .rank-num.r1 { background: var(--gold); color: #7a4a00; }
    .rank-num.r2 { background: var(--silver); color: #444; }
    .rank-num.r3 { background: var(--bronze); color: #6b2f1a; }
    .rank-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--blue-light); color: var(--blue-dark); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
    .rank-row.is-me .rank-avatar { background: var(--blue); color: white; }
    .rank-info { flex: 1; min-width: 0; }
    .rank-name { font-size: 13px; font-weight: 500; color: var(--text); }
    .rank-bar-bg { height: 3px; background: var(--bg); border-radius: 2px; margin-top: 4px; }
    .rank-bar-fill { height: 3px; border-radius: 2px; }
    .rank-val { text-align: right; flex-shrink: 0; }
    .rank-val-num { font-size: 14px; font-weight: 700; }
    .rank-val-unit { font-size: 10px; color: var(--text-hint); }
    .rank-empty { padding: 1.5rem; text-align: center; color: var(--text-hint); font-size: 13px; }
    .rank-month { text-align: center; padding: 8px; font-size: 11px; color: var(--text-hint); }

    /* MODAL */
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: none; align-items: flex-end; justify-content: center; z-index: 200; }
    .modal-bg.open { display: flex; }
    .modal { background: var(--card); border-radius: 24px 24px 0 0; padding: 1.5rem; width: 100%; max-width: 480px; }
    .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 1.25rem; }
    .water-btns { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
    .water-btn { padding: 8px 14px; border: 1.5px solid var(--c-water); border-radius: 20px; background: none; color: var(--c-water); font-size: 13px; font-weight: 500; font-family: inherit; cursor: pointer; }
    .modal-input-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .modal-input { flex: 1; padding: 14px; font-size: 28px; font-weight: 700; font-family: inherit; border: 2px solid var(--border); border-radius: 12px; text-align: center; outline: none; color: var(--text); background: var(--bg); }
    .modal-input:focus { border-color: var(--blue); }
    .modal-unit { font-size: 16px; color: var(--text-sub); font-weight: 500; min-width: 36px; }
    .modal-hint { font-size: 12px; color: var(--text-hint); margin-bottom: 1.25rem; }
    .modal-btns { display: flex; gap: 8px; }
    .btn-cancel { flex: 1; padding: 13px; border: 1.5px solid var(--border); border-radius: 10px; background: none; font-size: 14px; font-family: inherit; cursor: pointer; color: var(--text-sub); }
    .btn-confirm { flex: 2; padding: 13px; background: var(--blue); color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; }

    /* BOTTOM NAV */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--border); display: flex; padding: 8px 0 max(8px, env(safe-area-inset-bottom)); z-index: 100; }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; background: none; border: none; cursor: pointer; padding: 4px; font-family: inherit; color: var(--text-hint); }
    .nav-btn.active { color: var(--blue); }
    .nav-icon { font-size: 20px; }
    .nav-label { font-size: 10px; font-weight: 500; }

    .save-toast { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity 0.3s; z-index: 300; pointer-events: none; white-space: nowrap; }
    .save-toast.show { opacity: 1; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="screen active" id="screen-login">
  <div class="login-card">
    <div class="login-logo">
      <img src="logo.png" alt="CONTEC" />
      <div class="app-name">건강 챌린지</div>
      <div class="app-sub">CONTEC 임직원 전용 웰니스 프로그램</div>
    </div>
    <div class="field">
      <label>이름</label>
      <input type="text" id="inp-name" placeholder="홍길동" autocomplete="name" />
    </div>
    <div class="field">
      <label>접속 암호</label>
      <div class="pw-wrap">
        <input type="password" id="inp-pw" placeholder="••••••••" autocomplete="current-password" />

      <div class="error-msg" id="login-err"></div>
    </div>
    <button class="btn-login" id="btn-login">입장하기</button>
    <div class="login-hint">암호를 모르시면 담당자에게 문의하세요</div>
  </div>
</div>

<!-- MAIN -->
<div class="screen" id="screen-main">
  <div class="topbar">
    <img src="logo.png" alt="CONTEC" />
    <div class="topbar-right">
      <div class="topbar-name"><strong id="disp-name"></strong>님</div>
      <button class="btn-logout" id="btn-logout">로그아웃</button>
    </div>
  </div>

  <!-- 오늘 기록 페이지 -->
  <div class="main-content" id="page-today">
    <div class="today-header">
      <div>
        <div class="today-date" id="today-date"></div>
        <div class="today-title">오늘의 건강 기록</div>
      </div>
      <div class="today-badge" id="today-badge">0 / 4 완료</div>
    </div>

    <div class="section-title">항목 입력 (탭하여 수정)</div>
    <div class="input-grid">
      <div class="input-card" id="card-steps" onclick="openModal('steps')" style="--ic:#1B4F8E;">
        <div class="ic-bar" style="background:var(--c-steps)"></div>
        <div class="ic-icon">🚶</div>
        <div class="ic-label">걸음 수</div>
        <div class="ic-value" id="val-steps">0</div>
        <div class="ic-unit">걸음</div>
        <div class="ic-edit" style="color:var(--c-steps)">탭하여 입력</div>
      </div>
      <div class="input-card" id="card-exercise" onclick="openModal('exercise')" style="--ic:#1D9E75;">
        <div class="ic-bar" style="background:var(--c-exercise)"></div>
        <div class="ic-icon">💪</div>
        <div class="ic-label">운동 시간</div>
        <div class="ic-value" id="val-exercise">0</div>
        <div class="ic-unit">분</div>
        <div class="ic-edit" style="color:var(--c-exercise)">탭하여 입력</div>
      </div>
      <div class="input-card" id="card-sleep" onclick="openModal('sleep')" style="--ic:#7B5EA7;">
        <div class="ic-bar" style="background:var(--c-sleep)"></div>
        <div class="ic-icon">😴</div>
        <div class="ic-label">수면 시간</div>
        <div class="ic-value" id="val-sleep">0</div>
        <div class="ic-unit">시간</div>
        <div class="ic-edit" style="color:var(--c-sleep)">탭하여 입력</div>
      </div>
      <div class="input-card" id="card-water" onclick="openModal('water')" style="--ic:#2196F3;">
        <div class="ic-bar" style="background:var(--c-water)"></div>
        <div class="ic-icon">💧</div>
        <div class="ic-label">물 마시기</div>
        <div class="ic-value" id="val-water">0</div>
        <div class="ic-unit">잔 (200ml)</div>
        <div class="ic-edit" style="color:var(--c-water)">탭하여 입력</div>
      </div>
    </div>

    <button class="btn-save" id="btn-save">오늘 기록 저장하기</button>

    <div class="section-title">이번 달 내 누적</div>
    <div class="input-grid">
      <div class="input-card" style="cursor:default;">
        <div class="ic-icon">🚶</div>
        <div class="ic-label">총 걸음 수</div>
        <div class="ic-value" id="my-steps">-</div>
        <div class="ic-unit">걸음</div>
      </div>
      <div class="input-card" style="cursor:default;">
        <div class="ic-icon">💪</div>
        <div class="ic-label">총 운동</div>
        <div class="ic-value" id="my-exercise">-</div>
        <div class="ic-unit">분</div>
      </div>
      <div class="input-card" style="cursor:default;">
        <div class="ic-icon">😴</div>
        <div class="ic-label">평균 수면</div>
        <div class="ic-value" id="my-sleep">-</div>
        <div class="ic-unit">시간</div>
      </div>
      <div class="input-card" style="cursor:default;">
        <div class="ic-icon">💧</div>
        <div class="ic-label">총 수분</div>
        <div class="ic-value" id="my-water">-</div>
        <div class="ic-unit">잔</div>
      </div>
    </div>
  </div>

  <!-- 랭킹 페이지 -->
  <div class="main-content" id="page-ranking" style="display:none;">
    <div class="tabs">
      <button class="tab active" data-rank="steps">🚶 걸음</button>
      <button class="tab" data-rank="exercise">💪 운동</button>
      <button class="tab" data-rank="sleep">😴 수면</button>
      <button class="tab" data-rank="water">💧 수분</button>
    </div>
    <div id="rank-content"><div class="rank-list"><div class="rank-empty">불러오는 중...</div></div></div>
  </div>

  <div class="bottom-nav">
    <button class="nav-btn active" id="nav-today" onclick="switchPage('today')">
      <div class="nav-icon">📋</div>
      <div class="nav-label">오늘 기록</div>
    </button>
    <button class="nav-btn" id="nav-ranking" onclick="switchPage('ranking')">
      <div class="nav-icon">🏆</div>
      <div class="nav-label">랭킹</div>
    </button>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="modal-title" id="modal-title"></div>
    <div class="water-btns" id="water-btns" style="display:none;">
      <button class="water-btn" onclick="addWater(1)">+1잔</button>
      <button class="water-btn" onclick="addWater(2)">+2잔</button>
      <button class="water-btn" onclick="addWater(4)">+4잔</button>
      <button class="water-btn" onclick="addWater(8)">+8잔</button>
    </div>
    <div class="modal-input-wrap">
      <input type="number" class="modal-input" id="modal-input" min="0" />
      <div class="modal-unit" id="modal-unit"></div>
    </div>
    <div class="modal-hint" id="modal-hint"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-confirm" onclick="confirmModal()">확인</button>
    </div>
  </div>
</div>

<div class="save-toast" id="save-toast"></div>

<script>
const CONFIG = {
  password: 'contec2024',
  supabaseUrl: 'https://ifytanvhskqmbvmjoohi.supabase.co',
  supabaseKey: 'sb_publishable_jRme4n_S6tw5U3HBmv4Rgw_hKOfDXIy',
};

const CATS = {
  steps:    { label:'걸음 수',   unit:'걸음', color:'#1B4F8E', hint:'삼성헬스/애플건강에서 확인 후 입력하세요' },
  exercise: { label:'운동 시간', unit:'분',   color:'#1D9E75', hint:'오늘 운동한 총 시간 (유산소+근력 합산)' },
  sleep:    { label:'수면 시간', unit:'시간', color:'#7B5EA7', hint:'어젯밤 수면 시간을 입력하세요' },
  water:    { label:'물 마시기', unit:'잔',   color:'#2196F3', hint:'오늘 마신 물 잔 수 (1잔=200ml)' },
};

const SB = {
  h: { 'Content-Type':'application/json', 'apikey':CONFIG.supabaseKey, 'Authorization':'Bearer '+CONFIG.supabaseKey },
  async get(name, date) {
    const r = await fetch(CONFIG.supabaseUrl+'/rest/v1/health_records?name=eq.'+encodeURIComponent(name)+'&date=eq.'+date, {headers:this.h});
    if(!r.ok) return null;
    const d = await r.json(); return d[0]||null;
  },
  async upsert(name, date, data) {
    const ex = await this.get(name, date);
    const ym = date.slice(0,7);
    if(ex) {
      await fetch(CONFIG.supabaseUrl+'/rest/v1/health_records?id=eq.'+ex.id, {method:'PATCH', headers:{...this.h,'Prefer':'return=minimal'}, body:JSON.stringify({...data, updated_at:new Date().toISOString()})});
    } else {
      await fetch(CONFIG.supabaseUrl+'/rest/v1/health_records', {method:'POST', headers:{...this.h,'Prefer':'return=minimal'}, body:JSON.stringify({name, date, year_month:ym, ...data})});
    }
  },
  async ranking(ym, cat) {
    const r = await fetch(CONFIG.supabaseUrl+'/rest/v1/health_records?year_month=eq.'+ym+'&select=name,'+cat, {headers:this.h});
    if(!r.ok) return [];
    const rows = await r.json();
    const map = {};
    rows.forEach(row => { if(!map[row.name]) map[row.name]={sum:0,cnt:0}; map[row.name].sum+=(row[cat]||0); map[row.name].cnt++; });
    return Object.entries(map).map(([name,v])=>({name,val:v.sum,cnt:v.cnt})).sort((a,b)=>b.val-a.val);
  },
  async monthly(name, ym) {
    const r = await fetch(CONFIG.supabaseUrl+'/rest/v1/health_records?name=eq.'+encodeURIComponent(name)+'&year_month=eq.'+ym, {headers:this.h});
    return r.ok ? r.json() : [];
  }
};

const app = { name:'', today:{steps:0,exercise:0,sleep:0,water:0} };
let modalCat = '';

function getToday() { return new Date().toISOString().slice(0,10); }
function getYM() { const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }

// LOGIN
document.getElementById('btn-eye').addEventListener('click', function() {
  const i=document.getElementById('inp-pw');
  i.type=i.type==='password'?'text':'password';
  this.textContent=i.type==='password'?'보기':'숨기기';
});

async function doLogin() {
  const name=document.getElementById('inp-name').value.trim();
  const pw=document.getElementById('inp-pw').value;
  const err=document.getElementById('login-err');
  if(!name){showErr(err,'이름을 입력해주세요');return;}
  if(pw!==CONFIG.password){showErr(err,'암호가 올바르지 않습니다');return;}
  err.style.display='none';
  app.name=name;
  document.getElementById('disp-name').textContent=name;
  const d=new Date();
  document.getElementById('today-date').textContent=d.getFullYear()+'년 '+(d.getMonth()+1)+'월 '+d.getDate()+'일 '+['일','월','화','수','목','금','토'][d.getDay()]+'요일';
  // 세션 저장 (자동 로그인용)
  localStorage.setItem('contec_session', JSON.stringify({ name, savedAt: Date.now() }));

  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-main').classList.add('active');
  loadToday();
  loadMonthly();
}

document.getElementById('btn-login').addEventListener('click', doLogin);
document.getElementById('inp-pw').addEventListener('keydown', e=>{if(e.key==='Enter')doLogin();});
document.getElementById('inp-name').addEventListener('keydown', e=>{if(e.key==='Enter')document.getElementById('inp-pw').focus();});
function showErr(el,msg){el.textContent=msg;el.style.display='block';}

document.getElementById('btn-logout').addEventListener('click', ()=>{
  localStorage.removeItem('contec_session');
  localStorage.removeItem('contec_h');
  app.name=''; app.today={steps:0,exercise:0,sleep:0,water:0};
  document.getElementById('inp-pw').value='';
  document.getElementById('inp-name').value='';
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-login').classList.add('active');
});

// DATA
async function loadToday() {
  try {
    const cached=JSON.parse(localStorage.getItem('contec_h')||'{}');
    if(cached.date===getToday()&&cached.name===app.name){app.today=cached.data;updateTodayUI();}
    const rec=await SB.get(app.name,getToday());
    if(rec){app.today={steps:rec.steps||0,exercise:rec.exercise||0,sleep:rec.sleep||0,water:rec.water||0};updateTodayUI();saveCache();}
  } catch(e){}
}

async function loadMonthly() {
  try {
    const rows=await SB.monthly(app.name,getYM());
    let steps=0,exercise=0,sleep=0,water=0,sleepDays=0;
    rows.forEach(r=>{steps+=r.steps||0;exercise+=r.exercise||0;water+=r.water||0;if(r.sleep>0){sleep+=r.sleep;sleepDays++;}});
    document.getElementById('my-steps').textContent=steps.toLocaleString('ko-KR');
    document.getElementById('my-exercise').textContent=exercise;
    document.getElementById('my-sleep').textContent=sleepDays>0?(sleep/sleepDays).toFixed(1):0;
    document.getElementById('my-water').textContent=water;
  } catch(e){}
}

function saveCache() {
  localStorage.setItem('contec_h',JSON.stringify({date:getToday(),name:app.name,data:app.today}));
}

function updateTodayUI() {
  ['steps','exercise','sleep','water'].forEach(cat=>{
    const v=app.today[cat];
    document.getElementById('val-'+cat).textContent=cat==='steps'?v.toLocaleString('ko-KR'):v;
    document.getElementById('card-'+cat).classList.toggle('done',v>0);
  });
  const done=Object.values(app.today).filter(v=>v>0).length;
  document.getElementById('today-badge').textContent=done+' / 4 완료';
}

// SAVE
document.getElementById('btn-save').addEventListener('click', async ()=>{
  const btn=document.getElementById('btn-save');
  btn.disabled=true; btn.textContent='저장 중...';
  try {
    await SB.upsert(app.name,getToday(),app.today);
    saveCache(); loadMonthly();
    showToast('✅ 오늘 기록이 저장되었습니다!');
  } catch(e){ showToast('❌ 저장 실패. 다시 시도해주세요.'); }
  btn.disabled=false; btn.textContent='오늘 기록 저장하기';
});

function showToast(msg) {
  const t=document.getElementById('save-toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// MODAL
function openModal(cat) {
  modalCat=cat;
  const info=CATS[cat];
  document.getElementById('modal-title').textContent=info.label+' 입력';
  document.getElementById('modal-unit').textContent=info.unit;
  document.getElementById('modal-hint').textContent=info.hint;
  document.getElementById('modal-input').value=app.today[cat]||'';
  document.getElementById('water-btns').style.display=cat==='water'?'flex':'none';
  document.getElementById('modal-bg').classList.add('open');
  setTimeout(()=>document.getElementById('modal-input').focus(),100);
}
function closeModal(){document.getElementById('modal-bg').classList.remove('open');}
function confirmModal(){
  const v=parseFloat(document.getElementById('modal-input').value)||0;
  app.today[modalCat]=v; updateTodayUI(); closeModal();
}
function addWater(n){
  const v=parseFloat(document.getElementById('modal-input').value)||0;
  document.getElementById('modal-input').value=v+n;
}
document.getElementById('modal-bg').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});

// PAGE SWITCH
function switchPage(page) {
  document.getElementById('page-today').style.display=page==='today'?'block':'none';
  document.getElementById('page-ranking').style.display=page==='ranking'?'block':'none';
  document.getElementById('nav-today').classList.toggle('active',page==='today');
  document.getElementById('nav-ranking').classList.toggle('active',page==='ranking');
  if(page==='ranking') loadRanking('steps');
}

// RANKING
document.querySelectorAll('.tab[data-rank]').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab[data-rank]').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    loadRanking(tab.dataset.rank);
  });
});

async function loadRanking(cat) {
  const el=document.getElementById('rank-content');
  const info=CATS[cat];
  el.innerHTML='<div class="rank-list"><div class="rank-empty">불러오는 중...</div></div>';
  try {
    const list=await SB.ranking(getYM(),cat);
    if(!list.length){el.innerHTML='<div class="rank-list"><div class="rank-empty">이번 달 기록이 없습니다</div></div>';return;}
    const max=list[0]?.val||1;
    const [y,m]=getYM().split('-');
    el.innerHTML='<div class="rank-list">'+list.map((r,i)=>{
      const rank=i+1, isMe=r.name===app.name;
      const medal=rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':rank;
      const pct=Math.round(r.val/max*100);
      const disp=cat==='sleep'?(r.val/r.cnt).toFixed(1):r.val.toLocaleString('ko-KR');
      const unitLabel=cat==='sleep'?'시간 평균':info.unit;
      return `<div class="rank-row ${isMe?'is-me':''}">
        <div class="rank-num ${rank<=3?'r'+rank:''}">${typeof medal==='string'?medal:rank}</div>
        <div class="rank-avatar">${r.name.slice(0,1)}○</div>
        <div class="rank-info">
          <div class="rank-name">${r.name}${isMe?' (나)':''}</div>
          <div class="rank-bar-bg"><div class="rank-bar-fill" style="width:${pct}%;background:${info.color}"></div></div>
        </div>
        <div class="rank-val">
          <div class="rank-val-num" style="color:${info.color}">${disp}</div>
          <div class="rank-val-unit">${unitLabel}</div>
        </div>
      </div>`;
    }).join('')+`<div class="rank-month">${y}년 ${m}월 누적 랭킹</div></div>`;
  } catch(e){
    el.innerHTML='<div class="rank-list"><div class="rank-empty">랭킹을 불러올 수 없습니다</div></div>';
  }
}

// ═══ 자동 로그인 ═══
(function() {
  try {
    const session = JSON.parse(localStorage.getItem('contec_session') || 'null');
    if (session && session.name) {
      // 저장된 세션이 있으면 자동 로그인
      document.getElementById('inp-name').value = session.name;
      document.getElementById('inp-pw').value = CONFIG.password;
      doLogin();
    }
  } catch(e) {}
})();

if('serviceWorker' in navigator) window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
</script>
