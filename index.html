<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CONTEC 랭킹 만보기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue: #1B4F8E;
      --blue-dark: #143d6e;
      --blue-light: #B5D4F4;
      --blue-pale: #E6F1FB;
      --gold: #FAC775;
      --silver: #D3D1C7;
      --bronze: #F5C4B3;
      --text: #1a1a1a;
      --text-sub: #666;
      --text-hint: #999;
      --border: rgba(0,0,0,0.1);
      --bg: #f5f6f8;
      --card: #ffffff;
      --success: #1D9E75;
      --danger: #e24b4a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── SCREENS ── */
    .screen { display: none; min-height: 100vh; }
    .screen.active { display: flex; flex-direction: column; }

    /* ── LOGIN ── */
    #screen-login {
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
      background: linear-gradient(160deg, #f0f4fa 0%, #e8eef8 100%);
    }

    .login-card {
      width: 100%;
      max-width: 380px;
      background: var(--card);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      box-shadow: 0 4px 24px rgba(27,79,142,0.10);
    }

    .login-logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-logo img {
      width: 160px;
      height: auto;
      display: block;
      margin: 0 auto 14px;
    }
    .login-logo .app-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--blue);
      letter-spacing: -0.3px;
    }
    .login-logo .app-sub {
      font-size: 12px;
      color: var(--text-sub);
      margin-top: 4px;
    }

    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-sub);
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 11px 14px;
      font-size: 15px;
      font-family: inherit;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .field input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(27,79,142,0.12);
      background: #fff;
    }
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 56px; }
    .pw-eye {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      font-size: 12px; color: var(--text-hint);
      background: none; border: none; cursor: pointer; padding: 4px;
    }

    .error-msg {
      font-size: 12px;
      color: var(--danger);
      margin-top: 6px;
      display: none;
    }

    .btn-login {
      width: 100%;
      padding: 13px;
      margin-top: 8px;
      background: var(--blue);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-login:hover { background: var(--blue-dark); }
    .btn-login:active { transform: scale(0.98); }

    .login-hint {
      text-align: center;
      font-size: 12px;
      color: var(--text-hint);
      margin-top: 14px;
    }

    /* ── MAIN APP ── */
    #screen-main {
      flex-direction: column;
      background: var(--bg);
    }

    /* Topbar */
    .topbar {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0 1.25rem;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar img { height: 24px; width: auto; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .topbar-name { font-size: 13px; color: var(--text-sub); }
    .topbar-name strong { color: var(--text); font-weight: 700; }
    .btn-logout {
      font-size: 12px; color: var(--text-hint);
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 5px 10px; cursor: pointer;
      font-family: inherit;
    }
    .btn-logout:hover { color: var(--text); }

    /* Scroll content */
    .main-content { flex: 1; overflow-y: auto; padding: 1.25rem; padding-bottom: 2rem; }

    /* Sensor bar */
    .sensor-bar {
      background: var(--card);
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      border: 1px solid var(--border);
    }
    .sensor-left { display: flex; align-items: center; gap: 10px; }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text-hint);
      flex-shrink: 0;
    }
    .dot.on { background: var(--success); animation: blink 1.5s infinite; }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
    .sensor-text { font-size: 13px; color: var(--text-sub); }
    .btn-sensor {
      font-size: 13px; font-weight: 500; font-family: inherit;
      padding: 7px 16px;
      border: 1.5px solid var(--blue);
      border-radius: 8px;
      background: none;
      color: var(--blue);
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-sensor:hover { background: var(--blue-pale); }
    .btn-sensor.stop { border-color: var(--danger); color: var(--danger); }
    .btn-sensor.stop:hover { background: #fdf0f0; }

    /* Step ring card */
    .step-card {
      background: var(--card);
      border-radius: 20px;
      padding: 2rem 1.5rem 1.5rem;
      text-align: center;
      margin-bottom: 1rem;
      border: 1px solid var(--border);
    }
    .ring-wrap { position: relative; display: inline-block; margin-bottom: 1rem; }
    .step-ring { transform: rotate(-90deg); display: block; }
    .ring-track { fill: none; stroke: var(--bg); stroke-width: 10; }
    .ring-prog {
      fill: none; stroke: var(--blue); stroke-width: 10;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.6s cubic-bezier(.4,0,.2,1);
    }
    .ring-center {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      text-align: center;
      pointer-events: none;
    }
    .ring-steps { font-size: 36px; font-weight: 700; color: var(--blue); line-height: 1; }
    .ring-label { font-size: 11px; color: var(--text-hint); margin-top: 2px; }

    .step-goal-row { font-size: 13px; color: var(--text-sub); }
    .step-goal-row span { color: var(--blue); font-weight: 700; }
    .step-pct { font-size: 13px; color: var(--text-hint); margin-top: 4px; }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 1rem;
    }
    .stat-box {
      background: var(--card);
      border-radius: 14px;
      padding: 14px 10px;
      text-align: center;
      border: 1px solid var(--border);
    }
    .stat-icon { font-size: 18px; margin-bottom: 4px; }
    .stat-val { font-size: 20px; font-weight: 700; color: var(--text); }
    .stat-lbl { font-size: 11px; color: var(--text-hint); margin-top: 2px; }

    /* Tabs */
    .tabs {
      display: flex;
      background: var(--card);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 1rem;
      border: 1px solid var(--border);
      gap: 4px;
    }
    .tab {
      flex: 1; padding: 8px; font-size: 13px; font-weight: 500;
      border: none; border-radius: 8px; cursor: pointer;
      background: none; color: var(--text-sub); font-family: inherit;
      transition: all 0.15s;
    }
    .tab.active { background: var(--blue); color: white; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Ranking */
    .rank-list {
      background: var(--card);
      border-radius: 16px;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .rank-row {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .rank-row:last-child { border-bottom: none; }
    .rank-row.is-me { background: var(--blue-pale); }

    .rank-num {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; flex-shrink: 0;
      background: var(--bg); color: var(--text-sub);
    }
    .rank-num.r1 { background: var(--gold); color: #7a4a00; }
    .rank-num.r2 { background: var(--silver); color: #444; }
    .rank-num.r3 { background: var(--bronze); color: #6b2f1a; }

    .rank-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--blue-light); color: var(--blue-dark);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; flex-shrink: 0;
    }
    .rank-row.is-me .rank-avatar { background: var(--blue); color: white; }

    .rank-info { flex: 1; min-width: 0; }
    .rank-name { font-size: 14px; font-weight: 500; color: var(--text); }
    .rank-sub { font-size: 11px; color: var(--text-hint); margin-top: 1px; }

    .rank-steps { text-align: right; }
    .rank-steps-num { font-size: 15px; font-weight: 700; color: var(--blue); }
    .rank-steps-lbl { font-size: 11px; color: var(--text-hint); }

    /* Progress bar in rank */
    .rank-bar-wrap { padding: 0 16px 10px; }
    .rank-bar-bg { height: 3px; background: var(--bg); border-radius: 2px; margin-top: 6px; }
    .rank-bar-fill { height: 3px; background: var(--blue); border-radius: 2px; transition: width 0.4s ease; }

    /* Weekly chart */
    .weekly-card {
      background: var(--card);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 1.25rem;
    }
    .weekly-title { font-size: 13px; font-weight: 500; color: var(--text-sub); margin-bottom: 1rem; }
    .chart-bars { display: flex; align-items: flex-end; gap: 8px; height: 120px; margin-bottom: 8px; }
    .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; gap: 4px; }
    .bar-val { font-size: 9px; color: var(--text-hint); }
    .bar-body { width: 100%; border-radius: 5px 5px 0 0; background: var(--blue-light); min-height: 3px; transition: height 0.5s ease; }
    .bar-body.today { background: var(--blue); }
    .chart-days { display: flex; gap: 8px; }
    .day-lbl { flex: 1; text-align: center; font-size: 11px; color: var(--text-hint); }
    .day-lbl.today { color: var(--blue); font-weight: 700; }

    /* Empty ranking */
    .rank-empty { padding: 2rem; text-align: center; color: var(--text-hint); font-size: 13px; }
  </style>
</head>
<body>

<!-- ═══════════════════ LOGIN ═══════════════════ -->
<div class="screen active" id="screen-login">
  <div class="login-card">
    <div class="login-logo">
      <img src="logo.png" alt="CONTEC" />
      <div class="app-name">랭킹 만보기</div>
      <div class="app-sub">임직원 전용 걸음 수 챌린지</div>
    </div>

    <div class="field">
      <label>이름</label>
      <input type="text" id="inp-name" placeholder="홍길동" autocomplete="name" />
    </div>

    <div class="field">
      <label>접속 암호</label>
      <div class="pw-wrap">
        <input type="password" id="inp-pw" placeholder="••••••••" autocomplete="current-password" />
        <button class="pw-eye" id="btn-eye" type="button">보기</button>
      </div>
      <div class="error-msg" id="login-err"></div>
    </div>

    <button class="btn-login" id="btn-login">입장하기</button>
    <div class="login-hint">암호를 모르시면 담당자에게 문의하세요</div>
  </div>
</div>

<!-- ═══════════════════ MAIN ═══════════════════ -->
<div class="screen" id="screen-main">

  <div class="topbar">
    <img src="logo.png" alt="CONTEC" />
    <div class="topbar-right">
      <div class="topbar-name"><strong id="disp-name"></strong>님</div>
      <button class="btn-logout" id="btn-logout">로그아웃</button>
    </div>
  </div>

  <div class="main-content">

    <!-- Sensor -->
    <div class="sensor-bar">
      <div class="sensor-left">
        <div class="dot" id="sensor-dot"></div>
        <span class="sensor-text" id="sensor-text">센서 비활성화</span>
      </div>
      <button class="btn-sensor" id="btn-sensor">감지 시작</button>
    </div>

    <!-- Step ring -->
    <div class="step-card">
      <div class="ring-wrap">
        <svg class="step-ring" width="180" height="180" viewBox="0 0 180 180">
          <circle class="ring-track" cx="90" cy="90" r="78"/>
          <circle class="ring-prog" id="ring-prog" cx="90" cy="90" r="78"
            stroke-dasharray="490" stroke-dashoffset="490"/>
        </svg>
        <div class="ring-center">
          <div class="ring-steps" id="disp-steps">0</div>
          <div class="ring-label">걸음</div>
        </div>
      </div>
      <div class="step-goal-row">목표 <span id="disp-goal">10,000</span> 걸음</div>
      <div class="step-pct" id="disp-pct">0% 달성</div>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-icon">🚶</div>
        <div class="stat-val" id="disp-dist">0.0</div>
        <div class="stat-lbl">km</div>
      </div>
      <div class="stat-box">
        <div class="stat-icon">🔥</div>
        <div class="stat-val" id="disp-cal">0</div>
        <div class="stat-lbl">kcal</div>
      </div>
      <div class="stat-box">
        <div class="stat-icon">⏱</div>
        <div class="stat-val" id="disp-time">0</div>
        <div class="stat-lbl">분</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" data-tab="ranking">🏆 랭킹</button>
      <button class="tab" data-tab="weekly">📊 주간 기록</button>
    </div>

    <!-- Ranking panel -->
    <div class="tab-panel active" id="panel-ranking">
      <div class="rank-list" id="rank-list"></div>
    </div>

    <!-- Weekly panel -->
    <div class="tab-panel" id="panel-weekly">
      <div class="weekly-card">
        <div class="weekly-title">이번 주 걸음 수</div>
        <div class="chart-bars" id="chart-bars"></div>
        <div class="chart-days" id="chart-days"></div>
      </div>
    </div>

  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  설정 — 이 부분만 수정하면 됩니다
// ═══════════════════════════════════════════
const CONFIG = {
  password: 'contec2024',   // ← 암호 변경
  goal: 10000,              // ← 목표 걸음 수
};

// ═══════════════════════════════════════════
//  샘플 랭킹 데이터 (실제 서버 연동 전까지 사용)
//  배포 후 서버 연동 시 이 부분을 API 호출로 교체
// ═══════════════════════════════════════════
let mockRanking = [
  { name: '김지민', steps: 13450 },
  { name: '이수현', steps: 11200 },
  { name: '박민준', steps: 9800 },
  { name: '최찬우', steps: 8430 },
  { name: '정유진', steps: 7100 },
];

const weeklyHistory = [3200, 8500, 11200, 7600, 9900, 5400, 0]; // 월~일
const DAYS = ['월', '화', '수', '목', '금', '토', '일'];

// ═══════════════════════════════════════════
//  앱 상태
// ═══════════════════════════════════════════
const app = {
  name: '',
  steps: 0,
  activeMin: 0,
  sensing: false,
  _accBuf: [],
  _lastStep: 0,
  _activeTimer: null,
};

// ═══════════════════════════════════════════
//  화면 전환
// ═══════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ═══════════════════════════════════════════
//  로그인
// ═══════════════════════════════════════════
document.getElementById('btn-eye').addEventListener('click', function() {
  const inp = document.getElementById('inp-pw');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  this.textContent = inp.type === 'password' ? '보기' : '숨기기';
});

function doLogin() {
  const name = document.getElementById('inp-name').value.trim();
  const pw   = document.getElementById('inp-pw').value;
  const err  = document.getElementById('login-err');

  if (!name) { showErr(err, '이름을 입력해주세요'); return; }
  if (pw !== CONFIG.password) { showErr(err, '암호가 올바르지 않습니다'); return; }

  err.style.display = 'none';
  app.name = name;
  app.steps = 0;
  app.activeMin = 0;

  document.getElementById('disp-name').textContent = name;
  updateUI();
  renderRanking();
  renderWeekly();
  showScreen('screen-main');
}

document.getElementById('btn-login').addEventListener('click', doLogin);
document.getElementById('inp-pw').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('inp-name').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('inp-pw').focus(); });

function showErr(el, msg) { el.textContent = msg; el.style.display = 'block'; }

// ═══════════════════════════════════════════
//  로그아웃
// ═══════════════════════════════════════════
document.getElementById('btn-logout').addEventListener('click', () => {
  stopSensor();
  app.steps = 0; app.activeMin = 0;
  document.getElementById('inp-pw').value = '';
  document.getElementById('inp-name').value = '';
  showScreen('screen-login');
});

// ═══════════════════════════════════════════
//  탭
// ═══════════════════════════════════════════
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
  });
});

// ═══════════════════════════════════════════
//  센서 (걸음 감지)
// ═══════════════════════════════════════════
document.getElementById('btn-sensor').addEventListener('click', () => {
  app.sensing ? stopSensor() : startSensor();
});

function startSensor() {
  if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
    DeviceMotionEvent.requestPermission()
      .then(r => { if (r === 'granted') activateSensor(); else useFallback(); })
      .catch(useFallback);
  } else if (window.DeviceMotionEvent) {
    activateSensor();
  } else {
    useFallback();
  }
}

function activateSensor() {
  app.sensing = true;
  window.addEventListener('devicemotion', onMotion);
  document.getElementById('sensor-dot').classList.add('on');
  document.getElementById('sensor-text').textContent = '걸음 감지 중...';
  const btn = document.getElementById('btn-sensor');
  btn.textContent = '중지'; btn.classList.add('stop');
  app._activeTimer = setInterval(() => {
    app.activeMin++;
    document.getElementById('disp-time').textContent = app.activeMin;
  }, 60000);
}

function stopSensor() {
  app.sensing = false;
  window.removeEventListener('devicemotion', onMotion);
  document.getElementById('sensor-dot').classList.remove('on');
  document.getElementById('sensor-text').textContent = '센서 비활성화';
  const btn = document.getElementById('btn-sensor');
  btn.textContent = '감지 시작'; btn.classList.remove('stop');
  if (app._activeTimer) clearInterval(app._activeTimer);
}

function useFallback() {
  document.getElementById('sensor-text').textContent = '수동 입력 모드';
  const btn = document.getElementById('btn-sensor');
  btn.textContent = '+100 걸음';
  btn.classList.remove('stop');
  btn.onclick = () => { addSteps(100); };
}

function onMotion(e) {
  const acc = e.accelerationIncludingGravity;
  if (!acc) return;
  const mag = Math.sqrt(acc.x * acc.x + acc.y * acc.y + acc.z * acc.z);
  app._accBuf.push(mag);
  if (app._accBuf.length > 6) app._accBuf.shift();
  const avg = app._accBuf.reduce((a, b) => a + b, 0) / app._accBuf.length;
  const now = Date.now();
  if (mag > avg + 11 && now - app._lastStep > 320) {
    app._lastStep = now;
    addSteps(1);
  }
}

function addSteps(n) {
  app.steps += n;
  updateUI();
  renderRanking();
}

// ═══════════════════════════════════════════
//  UI 업데이트
// ═══════════════════════════════════════════
function updateUI() {
  const s = app.steps;
  const pct = Math.min(100, Math.round(s / CONFIG.goal * 100));
  const circ = 2 * Math.PI * 78;

  document.getElementById('disp-steps').textContent = s.toLocaleString('ko-KR');
  document.getElementById('disp-pct').textContent = pct + '% 달성';
  document.getElementById('ring-prog').style.strokeDashoffset = (circ * (1 - pct / 100)).toFixed(2);
  document.getElementById('disp-dist').textContent = (s * 0.00075).toFixed(2);
  document.getElementById('disp-cal').textContent = Math.round(s * 0.04);
}

// ═══════════════════════════════════════════
//  랭킹 렌더
// ═══════════════════════════════════════════
function renderRanking() {
  const list = [...mockRanking];
  const myIdx = list.findIndex(r => r.name === app.name);
  if (myIdx >= 0) list[myIdx] = { ...list[myIdx], steps: app.steps };
  else list.push({ name: app.name, steps: app.steps });
  list.sort((a, b) => b.steps - a.steps);

  const maxSteps = list[0]?.steps || 1;
  const el = document.getElementById('rank-list');

  if (!list.length) {
    el.innerHTML = '<div class="rank-empty">아직 참가자가 없습니다</div>';
    return;
  }

  el.innerHTML = list.map((r, i) => {
    const rank = i + 1;
    const isMe = r.name === app.name;
    const numCls = rank <= 3 ? 'r' + rank : '';
    const medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
    const barPct = Math.round(r.steps / maxSteps * 100);
    const init = r.name.slice(0, 1) + '○';

    return `
    <div class="rank-row ${isMe ? 'is-me' : ''}">
      <div class="rank-num ${numCls}">${typeof medal === 'string' ? medal : rank}</div>
      <div class="rank-avatar">${init}</div>
      <div class="rank-info">
        <div class="rank-name">${r.name}${isMe ? ' (나)' : ''}</div>
        <div class="rank-bar-bg"><div class="rank-bar-fill" style="width:${barPct}%"></div></div>
      </div>
      <div class="rank-steps">
        <div class="rank-steps-num">${r.steps.toLocaleString('ko-KR')}</div>
        <div class="rank-steps-lbl">걸음</div>
      </div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════
//  주간 차트 렌더
// ═══════════════════════════════════════════
function renderWeekly() {
  const todayIdx = new Date().getDay() === 0 ? 6 : new Date().getDay() - 1;
  const data = [...weeklyHistory];
  data[todayIdx] = app.steps;
  const max = Math.max(...data, 1);

  document.getElementById('chart-bars').innerHTML = data.map((v, i) => {
    const h = Math.round(v / max * 110);
    const isToday = i === todayIdx;
    const label = v > 0 ? (v >= 1000 ? Math.round(v / 100) / 10 + 'k' : v) : '';
    return `<div class="bar-col">
      <div class="bar-val">${label}</div>
      <div class="bar-body ${isToday ? 'today' : ''}" style="height:${h}px"></div>
    </div>`;
  }).join('');

  document.getElementById('chart-days').innerHTML = DAYS.map((d, i) =>
    `<div class="day-lbl ${i === todayIdx ? 'today' : ''}">${d}</div>`
  ).join('');
}

// 초기 UI
updateUI();
</script>
